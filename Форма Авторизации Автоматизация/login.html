<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма логина</title>
    <script>
        function login(event) {
            event.preventDefault(); // Останавливаем отправку формы

            // Получаем введенные данные
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const messageField = document.getElementById("message");

            // Проверка на пустое имя пользователя
            if (!username) {
                messageField.style.color = "red";
                messageField.textContent = "Долбоёб где имя?";
                return;
            }

            // Проверка на пустой пароль
            if (!password) {
                messageField.style.color = "red";
                messageField.textContent = "Пароль введи урод!";
                return;
            }

            // Проверяем правильность учетных данных
            if (username === "admin" && password === "admin1") {
                messageField.style.color = "green";
                messageField.textContent = "Ты вошёл Пидр!";
            } else {
                messageField.style.color = "red";
                messageField.textContent = "Запрет Пидр!";
            }
        }
    </script>
</head>
<body>

    <h2>Форма логина</h2>
    <form action="#" method="post" onsubmit="login(event)">
        <div>
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" name="username">
        </div>
        <br>
        <div>
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password">
        </div>
        <br>
        <div>
            <button type="submit">Войти</button>
        </div>
        <div id="message"></div> <!-- Место для вывода сообщения -->
    </form>

</body>
</html>
